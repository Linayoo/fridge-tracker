repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: bash -c 'cd "$(git rev-parse --show-toplevel)/backend" && poetry run pytest -x -q'
        language: system
        types: [python]
        pass_filenames: false
